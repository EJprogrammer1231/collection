<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Search App</title>
</head>
<body>

  <main>
    <h1>Movie Search App</h1>

    <form id="movie-form">
      <input
        id="movie-input"
        type="search"
        placeholder="Search a movie..."
      >
      <button type="submit">Search</button>
    </form>

    <section id="movie-card">

      <img
        id="poster"
        src=""
        alt="Movie Poster"
      >

      <h2 id="title"></h2>

      <p id="year"></p>

      <p id="genre"></p>

      <p id="imdb-rating"></p>

      <p id="plot"></p>

    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
