<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather api</title>
</head>
<body>
  <div class="container">

  <!-- Search Form -->
  <form id="weather-form">
    <input
      type="text"
      id="city-input"
      placeholder="Enter city name"
    >
    <button type="submit">
      Search
    </button>
  </form>

  <!-- Weather Card -->
  <div id="weather-card">

    <h2 id="city-name">
      City Name
    </h2>

    <p id="temperature">
      Temperature: --
    </p>

    <p id="weather-condition">
      Condition: --
    </p>

    <p id="humidity">
      Humidity: --
    </p>

    <p id="wind-speed">
      Wind Speed: --
    </p>

  </div>

  <script src="script.js"></script>
</div>
</body>
</html>
